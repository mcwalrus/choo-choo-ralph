formula = "bug-fix"
description = """
# BUG FIX ORCHESTRATOR: {{title}}

You are the orchestrator for fixing a bug.

## Bug Details
{{task}}

## Related Epic
This bug may be related to: {{related_epic}}

## Your Children
This molecule has 4 sequential steps:
1. **diagnose** - Understand the bug and find root cause (Sub-agent)
2. **fix** - Make the code changes to fix it (Sub-agent)
3. **verify** - Run tests and validate the fix (Sub-agent)
4. **commit** - Create git commit (Inline - you do this)

## Execution Instructions

### Sub-Agent Steps (diagnose, fix, verify)
For steps with assignee `ralph-subagent-*`:
1. Check if ready: `bd ready --parent <your-id>`
2. Get step details: `bd show <step-id> --json`
3. Spawn a Task agent with the step's bead JSON as context
4. Wait for the sub-agent to complete and return its findings
5. Act on the sub-agent's report (see step-specific handling below)
6. Close the step: `bd close <step-id>`
7. Proceed to next step once dependency is satisfied

### Inline Step (commit)
For steps with assignee `ralph-inline-*`:
1. Execute the step yourself directly
2. Follow the step's description for instructions
3. Close the step when done: `bd close <step-id>`
4. Add a comment summarizing what was done

## Commands
- Check ready children: `bd ready --parent <your-id>`
- View step details: `bd show <step-id>`
- Close completed step: `bd close <step-id>`
- Add progress note: `bd comments add <step-id> "..."`

## Handling Step Results

### After Diagnose Step
The diagnose sub-agent will report back with one of:
- **REPRODUCIBLE**: Root cause found, files identified, ready for fix
- **CANNOT_REPRODUCE**: Issue not reproducible after investigation

If CANNOT_REPRODUCE:
1. Add comment: `bd comments add <your-id> "[cannot-reproduce] <investigation summary>"`
2. Close the bug: `bd close <your-id> --reason "Cannot reproduce after investigation"`
3. Exit

### After Fix Step
The fix sub-agent will report what was changed. Close the step and proceed to verify.

### After Verify Step
The verify sub-agent will report one of:
- **PASS**: Bug is fixed, all checks pass
- **FAIL**: Bug still present or new issues found

If FAIL:
1. Check attempt count (count `[attempt-N]` comments on your bead)
2. If < 3 attempts:
   - Add attempt comment: `bd comments add <your-id> "[attempt-N] Fix attempt N: FAIL - <reason from verify>"`
   - Reopen fix step: `bd update <fix-step-id> --status open`
   - Add guidance to fix step: `bd comments add <fix-step-id> "[REWORK] <what verify found wrong>"`
   - Loop back to wait for fix step
3. If >= 3 attempts: Execute blocking logic (see below)

If PASS:
- Add attempt comment: `bd comments add <your-id> "[attempt-N] Fix attempt N: PASS"`
- Proceed to commit step

## Attempt Tracking

Before processing verify results, count `[attempt-N]` comments on your bead.

### If 3+ Attempts Failed

1. **Add critical comment**:
   ```bash
   bd comments add <your-id> "[CRITICAL] Bug cannot be resolved after 3 attempts. Requires human intervention."
   ```

2. **Block yourself**:
   ```bash
   bd update <your-id> --status blocked
   ```

3. **Exit**

## Completion

When all 4 steps are closed successfully:

1. **Review learning comments** - Check if any steps added `[diagnose]`, `[fix]`, or `[verify]` comments to your bead
2. **Synthesize patterns** - If learnings were added, consider:
   - What caused this bug? Is it a pattern that could happen again?
   - Should something be added to CLAUDE.md to prevent recurrence?
   - Is there a skill that could help avoid this type of bug?
3. **Add summary comment**:
   ```
   bd comments add <your-id> "[summary] Fixed: <what>. Root cause: <cause>. Prevention: <if any>"
   ```
4. **Add learnings label** - If your summary includes prevention recommendations:
   ```
   bd label add <your-id> learnings
   ```
5. **Close yourself** with `bd close <your-id>`

### Learning Synthesis Guidelines
- Bug fixes often reveal gaps in documentation or skills
- If the root cause was a missing pattern → note "Consider adding to CLAUDE.md: ..."
- If similar bugs keep appearing → note "Consider creating skill for: ..."
- Focus on prevention, not just the fix

**IMPORTANT**: Complete this entire molecule (all 4 steps), then exit. Do NOT look for or grab another molecule.

Your ID is in the bead data you received.
"""
version = 1
type = "workflow"

[vars.title]
description = "Short title for the bug"
required = true

[vars.task]
description = "Detailed description of what's broken and symptoms"
required = true

[vars.related_epic]
description = "The bead ID of the epic that may be related to this bug"
required = false

[[steps]]
id = "diagnose"
title = "Diagnose {{title}}"
assignee = "ralph-subagent-diagnose"
labels = ["ralph-step", "diagnose"]
description = """
# DIAGNOSIS PHASE

## Goal
Understand the bug and find the root cause. Report findings back to orchestrator.

## Bug Context
{{task}}

## Steps
1. **Reproduce the issue** - Verify you can see the failure
2. **Check git history** - What changed recently? (`git log --oneline -10`)
3. **Trace the error** - Follow stack traces, error messages
4. **Identify root cause** - What code is actually broken?
5. **Document findings** - Add comment with analysis

## Cannot Reproduce

If after thorough investigation you CANNOT reproduce the issue:
1. Run the failing check multiple times to confirm it's not flaky
2. Check if environment differs from when bug was reported
3. Verify the issue wasn't already fixed by another task

## Output to Orchestrator

Add a comment to THIS bead with your findings, then report to orchestrator.

**If reproducible**, your report should include:
```
STATUS: REPRODUCIBLE
ROOT_CAUSE: <what's broken>
FILES: <files that need to change>
APPROACH: <recommended fix>
```

**If not reproducible**, your report should include:
```
STATUS: CANNOT_REPRODUCE
INVESTIGATION: <what you tried>
LIKELY_CAUSE: <flaky test / transient failure / already fixed>
```

The orchestrator will decide next steps based on your report.

## Learnings (if applicable)
If you discovered something noteworthy, add a comment to the ROOT/PARENT bead (not this step):
- A pattern that led to this bug
- A missing test that would have caught it
- Something that should be in CLAUDE.md but isn't

Use: `bd comments add <root-id> "[diagnose] <your learning>"`

Only add learnings that would help prevent similar bugs in future.
"""

[[steps]]
id = "fix"
title = "Fix {{title}}"
assignee = "ralph-subagent-fix"
labels = ["ralph-step", "fix"]
needs = ["diagnose"]
description = """
# FIX PHASE

## Goal
Make the code changes to fix the bug. Report what was changed back to orchestrator.

## Bug Context
{{task}}

## Instructions
1. **Review diagnosis** - Check the diagnose step's comments for context
2. **Check for rework comments** - If this step was reopened, check for `[REWORK]` comments with guidance
3. **Make minimal changes** - Fix only what's broken, don't refactor
4. **Follow existing patterns** - Match the codebase style
5. **Consider side effects** - Will this fix break anything else?

## Output to Orchestrator

Add a comment to THIS bead summarizing your changes:
```
CHANGES: <what was changed>
RATIONALE: <why this fixes the issue>
VERIFY_FOCUS: <specific things verify should check>
```

The orchestrator will close this step and proceed to verification.

## Learnings (if applicable)
If you encountered something noteworthy, add a comment to the ROOT/PARENT bead (not this step):
- A pattern you had to follow that wasn't documented
- A gotcha that made the fix harder
- Something that might warrant a skill

Use: `bd comments add <root-id> "[fix] <your learning>"`

Only add learnings for non-obvious issues. Routine fixes don't need a learning comment.
"""

[[steps]]
id = "verify"
title = "Verify {{title}}"
assignee = "ralph-subagent-verify"
labels = ["ralph-step", "verify"]
needs = ["fix"]
description = """
# VERIFICATION PHASE

## Goal
Verify the bug is actually fixed. Report results back to orchestrator.

## Bug Context
{{task}}

## Checks
1. **Reproduce original issue** - Confirm it no longer occurs
2. **Run type checking** - `bun typecheck` or equivalent
3. **Run tests** - Full test suite
4. **Run any smoke tests** - If applicable

## Output to Orchestrator

Add a comment to THIS bead with verification results.

**If fix succeeded**:
```
STATUS: PASS
VERIFICATION: <what was checked>
RESULT: Bug no longer reproducible, all checks pass
```

**If fix failed**:
```
STATUS: FAIL
ISSUE: <what's still broken or what new issue appeared>
SUGGESTION: <what the fix step should try differently>
```

The orchestrator will decide next steps based on your report. Do NOT reopen the fix step yourself - that's the orchestrator's job.

## Learnings (if applicable)
If you encountered something noteworthy, add a comment to the ROOT/PARENT bead (not this step):
- A test that should have existed but didn't
- A verification pattern that caught something unexpected
- UI/UX issues related to the bug

Use: `bd comments add <root-id> "[verify] <your learning>"`

Only add learnings for issues that future agents would benefit from knowing.
"""

[[steps]]
id = "commit"
title = "Commit {{title}}"
assignee = "ralph-inline-commit"
labels = ["ralph-step", "commit"]
needs = ["verify"]
description = """
# COMMIT PHASE

## Goal
Create a clean git commit for the bug fix.

## Commit Message Format
```
fix(<scope>): <description>

<body explaining what was broken and how it was fixed>

Related: {{related_epic}}
Refs: <this-bead-id>
```

## Instructions
1. **Review changes** - Run `git diff` to see all modifications
2. **Stage relevant files** - Only include files related to this fix
3. **Write commit message** - Follow conventional commits format
4. **Create commit** - Use the commit skill or git directly

## Output
Add a comment with:
- The commit hash
- The commit message used
- Confirmation the commit was successful
"""
